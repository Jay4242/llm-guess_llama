name: Build

on:
  push:
    branches:
      - main
    paths:
      - "**/*.c"
      - "**/*.h"
      - "Makefile"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "**/*.c"
      - "**/*.h"
      - "Makefile"
      - ".github/workflows/build.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  linux-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout raylib
        uses: actions/checkout@v4
        with:
          repository: raysan5/raylib
          path: raylib

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libjansson-dev \
            libasound2-dev \
            mesa-common-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Build and install raylib
        run: |
          cmake -S raylib -B raylib/build -DCMAKE_BUILD_TYPE=Release -DBUILD_EXAMPLES=OFF -DBUILD_SHARED_LIBS=ON
          cmake --build raylib/build --config Release -j"$(nproc)"
          sudo cmake --install raylib/build
          sudo ldconfig

      - name: Build
        run: |
          make clean
          make

      - name: Package
        run: |
          mkdir -p dist
          cp guess_llama dist/
          cp README.md dist/
          cp LICENSE dist/
          tar -czf guess_llama-linux-x86_64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guess_llama-linux-x86_64
          path: guess_llama-linux-x86_64.tar.gz

      - name: Upload release asset
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: guess_llama-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
